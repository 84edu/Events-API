name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Set up Docker Buildx (helps with caching and building)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Build the Image
      - name: Build Docker image
        run: |
          docker build -t events-api:latest .

      # 3. Start Container
      # We use `-d` for the background and map port 5000.
      - name: Start container
        run: |
          # We map host port 5002 to container port 5000.
          docker run -d -p 5002:5000 --name active-events-api events-api:latest
          # Important: Give the app time to boot up.
          sleep 10

      # 4. The Health Check
      # We use curl to check if the API is responding.
      - name: Check Health
        run: |
          curl --fail http://localhost:5002/api/events || exit 1

      # 5. Set up Python on the Runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 6. Install dependencies on the runner
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests 

      # 7. Run Tests
      - name: Run Tests
        run: |
          pytest -v